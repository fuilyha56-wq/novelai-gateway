<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网关安全验证 - NovelAI Gateway</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #6366f1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        h2 {
            font-size: 18px;
            color: #9ca3af;
            margin-bottom: 25px;
            font-weight: normal;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 8px;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #374151;
            background-color: #1f2937;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus {
            border-color: #6366f1;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4f46e5;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #4338ca;
        }
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 15px;
            min-height: 20px;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #4b5563;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span>🛡️</span> NovelAI Gateway
        </div>
        <h2>此代理网关已受密码保护</h2>
        <div class="input-group">
            <label for="password">输入网关访问密码</label>
            <input type="password" id="password" placeholder="••••••••" autofocus onkeydown="if(event.key==='Enter') verify()">
        </div>
        <button onclick="verify()">解锁访问</button>
        <div class="error-msg" id="error"></div>
        <div class="footer">
            Powered by Gateway Security Layer
        </div>
    </div>
    <script>
        function verify() {
            const pass = document.getElementById('password').value;
            if (!pass) {
                document.getElementById('error').innerText = '请输入密码';
                return;
            }
            
            // 将密码写入 Cookie 并保存 30 天
            const d = new Date();
            d.setTime(d.getTime() + (30*24*60*60*1000));
            document.cookie = "gw_pass=" + encodeURIComponent(pass) + ";path=/;expires=" + d.toUTCString();
            
            // 刷新页面重新加载
            window.location.reload();
        }
    </script>
</body>
</html>
